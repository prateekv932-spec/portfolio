<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1f4037,#99f2c8);
}

/* Calculator Body */

.calculator{

background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;

box-shadow:
20px 20px 40px rgba(0,0,0,0.4),
-10px -10px 30px rgba(255,255,255,0.2);

width:340px;

}

/* Display */

.display{

width:100%;
height:70px;

border:none;
outline:none;

font-size:2rem;
text-align:right;
padding:10px;

border-radius:12px;

background:rgba(0,0,0,0.6);
color:white;

margin-bottom:20px;

box-shadow:
inset 5px 5px 10px rgba(0,0,0,0.6),
inset -2px -2px 6px rgba(255,255,255,0.2);

}

/* Buttons Grid */

.buttons{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;

}

/* Button Style */

button{

padding:18px;
font-size:1.1rem;

border:none;
border-radius:12px;

cursor:pointer;

transition:all 0.15s ease;

box-shadow:
6px 6px 12px rgba(0,0,0,0.5),
-3px -3px 6px rgba(255,255,255,0.15);

}

/* Press effect */

button:active{

transform:translateY(3px);

box-shadow:
inset 4px 4px 8px rgba(0,0,0,0.6),
inset -2px -2px 5px rgba(255,255,255,0.2);

}

/* Button Colors */

.number{
background:#ffffff;
}

.operator{
background:#ff7675;
color:white;
}

.function{
background:#74b9ff;
color:white;
}

.equals{
background:#00b894;
color:white;
grid-row:span 2;
}

.zero{
grid-column:span 2;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" class="display" readonly>

<div class="buttons">

<button class="function" onclick="append('(')">(</button>
<button class="function" onclick="append(')')">)</button>
<button class="function" onclick="square()">x²</button>
<button class="operator" onclick="clearDisplay()">AC</button>

<button class="function" onclick="percentage()">%</button>
<button class="function" onclick="append('Math.sqrt(')">√</button>
<button class="operator" onclick="append('/')">÷</button>
<button class="operator" onclick="append('*')">×</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="append('-')">-</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('+')">+</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="equals" onclick="calculate()">=</button>

<button class="number zero" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>

</div>

</div>

<script>

const display=document.getElementById("display");

function append(value){
display.value+=value;
}

function clearDisplay(){
display.value="";
}

function square(){

try{
display.value = eval(display.value) ** 2;
}catch{
display.value="Error";
}

}

function percentage(){

try{
display.value = eval(display.value) / 100;
}catch{
display.value="Error";
}

}

function calculate(){

try{

let expression=display.value
.replace(/×/g,"*")
.replace(/÷/g,"/");

let result=eval(expression);

display.value=result;

}catch{

display.value="Error";

}

}

/* Keyboard Support */

document.addEventListener("keydown",function(e){

if(e.key>='0' && e.key<='9' || e.key=='.')
append(e.key);

else if(e.key=='+'||e.key=='-'||e.key=='*'||e.key=='/')
append(e.key);

else if(e.key=='Enter')
calculate();

else if(e.key=='Escape')
clearDisplay();

});

</script>

</body>
</html>
